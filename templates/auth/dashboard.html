{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">🏥 Hospital Dashboard</h2>

<!-- STATS CARDS -->
<div class="row mb-4">

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Patients</h5>
            <h2>{{ stats.patients }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Doctors</h5>
            <h2>{{ stats.doctors }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Appointments</h5>
            <h2>{{ stats.appointments }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Billing</h5>
            <h2>{{ stats.billings }}</h2>
        </div>
    </div>

</div>

<!-- CHART -->
<div class="card p-4">

    <h4>System Overview</h4>

    <canvas id="hospitalChart"></canvas>

</div>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = JSON.parse('{{ chart_data.labels | tojson | safe }}');
const values = JSON.parse('{{ chart_data.values | tojson | safe }}');

const ctx = document.getElementById('hospitalChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Hospital Data',
            data: values
        }]
    }
});

</script>

{% endblock %}
