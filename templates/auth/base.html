<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Hospital System{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">

    <a class="navbar-brand" href="/dashboard">🏥 Hospital</a>

    <div>

        <a class="btn btn-outline-light btn-sm" href="/patients">Patients</a>
        <a class="btn btn-outline-light btn-sm" href="/doctors">Doctors</a>
        <a class="btn btn-outline-light btn-sm" href="/appointments">Appointments</a>

        {% if session.role == "admin" %}
            <a class="btn btn-warning btn-sm" href="/billing">Billing</a>
        {% endif %}

        <a class="btn btn-danger btn-sm" href="/auth/logout">Logout</a>

    </div>

</nav>

<div class="container mt-4">

<!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-success">{{ msg }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</div>

</body>
</html>
