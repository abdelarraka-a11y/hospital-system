{% extends "base.html" %}

{% block content %}

<h2>Edit Appointment</h2>

<form method="POST">

    <label>Patient</label>
    <br>

    <select name="patient_id">

        {% for p in patients %}
            <option value="{{ p.id }}"
            {% if p.id == appointment.patient_id %}selected{% endif %}>
                {{ p.name }}
            </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Doctor</label>
    <br>

    <select name="doctor_id">

        {% for d in doctors %}
            <option value="{{ d.id }}"
            {% if d.id == appointment.doctor_id %}selected{% endif %}>
                {{ d.name }}
            </option>
        {% endfor %}

    </select>

    <br><br>

    <input name="date" value="{{ appointment.date }}">
    <br><br>

    <input name="reason" value="{{ appointment.reason }}">
    <br><br>

    <button type="submit">Update</button>

</form>

{% endblock %}
